<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>贪吃蛇</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #1a1a2e;
  display: flex; justify-content: center; align-items: center;
  height: 100vh; font-family: 'Segoe UI', sans-serif;
  flex-direction: column; gap: 20px;
}
canvas { border: 2px solid #e94560; background: #16213e; border-radius: 8px; }
.info { color: #e94560; font-size: 20px; font-weight: bold; }
#score { color: #0f3460; background: #e94560; padding: 4px 16px; border-radius: 20px; }
</style>
</head>
<body>
<div class="info">分数: <span id="score">0</span></div>
<canvas id="canvas"></canvas>
<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const grid = 20;
const cols = 30, rows = 20;
canvas.width = cols * grid;
canvas.height = rows * grid;

let snake = [{x:15, y:10}, {x:14, y:10}, {x:13, y:10}];
let dir = {x:1, y:0};
let food = spawnFood();
let score = 0;
let gameOver = false;

function spawnFood() {
  let f;
  do {
    f = { x: Math.floor(Math.random() * cols), y: Math.floor(Math.random() * rows) };
  } while (snake.some(s => s.x === f.x && s.y === f.y));
  return f;
}

function update() {
  if (gameOver) return;
  const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };
  if (head.x < 0 || head.x >= cols || head.y < 0 || head.y >= rows || snake.some(s => s.x === head.x && s.y === head.y)) {
    gameOver = true;
    return;
  }
  snake.unshift(head);
  if (head.x === food.x && head.y === food.y) {
    score += 10;
    document.getElementById('score').textContent = score;
    food = spawnFood();
  } else {
    snake.pop();
  }
}

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  snake.forEach((s, i) => {
    ctx.fillStyle = i === 0 ? '#e94560' : '#533483';
    ctx.fillRect(s.x * grid + 1, s.y * grid + 1, grid - 2, grid - 2);
  });
  ctx.fillStyle = '#f5c518';
  ctx.fillRect(food.x * grid + 1, food.y * grid + 1, grid - 2, grid - 2);
  if (gameOver) {
    ctx.fillStyle = 'rgba(0,0,0,0.7)';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    ctx.fillStyle = '#e94560';
    ctx.font = 'bold 32px Segoe UI';
    ctx.textAlign = 'center';
    ctx.fillText('游戏结束', canvas.width/2, canvas.height/2 - 10);
    ctx.font = '16px Segoe UI';
    ctx.fillText('按空格键重新开始', canvas.width/2, canvas.height/2 + 30);
  }
}

function loop() { update(); draw(); }

document.addEventListener('keydown', e => {
  if (gameOver && e.key === ' ') { reset(); return; }
  const keyMap = { ArrowUp:{x:0,y:-1}, ArrowDown:{x:0,y:1}, ArrowLeft:{x:-1,y:0}, ArrowRight:{x:1,y:0} };
  const nd = keyMap[e.key];
  if (nd && (nd.x !== -dir.x || nd.y !== -dir.y)) dir = nd;
});

function reset() {
  snake = [{x:15, y:10}, {x:14, y:10}, {x:13, y:10}];
  dir = {x:1, y:0}; score = 0; gameOver = false;
  document.getElementById('score').textContent = '0';
  food = spawnFood();
}

setInterval(loop, 120);
</script>
</body>
</html>
